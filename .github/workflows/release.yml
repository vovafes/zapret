# ──────────────────────────────────────────────────────────────────────────────
#  zapret-discord — Automated Build & Release Pipeline
#  Repository: https://github.com/vovafes/zapret
#
#  Triggers:
#    • Push of a tag matching v*.*.* (e.g. v1.2.0)
#    • Manual run via workflow_dispatch with a custom tag name
#
#  Pipeline steps:
#    1.  Resolve release metadata (tag, draft/prerelease flags, artifact name)
#    2.  Create and push the git tag when triggered manually
#    3.  Set up Python 3.11 with pip cache
#    4.  Install pydivert + pyinstaller
#    5.  Download and verify WinDivert 2.2.2 (official GitHub release)
#    6.  Build zapret-discord.exe via PyInstaller (--onefile --uac-admin)
#    7.  Verify the produced binary exists and print its SHA-256
#    8.  Package .exe + WinDivert binaries + README into a release ZIP
#    9.  Publish the ZIP as a GitHub Release via softprops/action-gh-release
# ──────────────────────────────────────────────────────────────────────────────

name: "Build & Release"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag (e.g. v1.2.0 or v1.2.0-beta)"
        required: true
        default: "v1.2.0-dev"
      draft:
        description: "Publish as a draft release?"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

env:
  APP_NAME:          "zapret-discord"
  PYTHON_VERSION:    "3.11"
  WINDIVERT_VERSION: "2.2.2"
  WINDIVERT_URL:     "https://github.com/basil00/WinDivert/releases/download/v2.2.2/WinDivert-2.2.2-A.zip"

jobs:
  build-and-release:
    name: "Build · Package · Release"
    runs-on: windows-latest

    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: "Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Resolve release metadata ─────────────────────────────────────────
      - name: "Resolve release metadata"
        id: meta
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag   = "${{ github.event.inputs.tag_name }}"
            $draft = "${{ github.event.inputs.draft }}"
          } else {
            $tag   = "${{ github.ref_name }}"
            $draft = "false"
          }

          $isPrerelease = ($tag -match '-dev|-beta|-alpha|-rc') ? "true" : "false"
          $zipName      = "${{ env.APP_NAME }}-${tag}.zip"

          "TAG=${tag}"                 >> $env:GITHUB_OUTPUT
          "DRAFT=${draft}"             >> $env:GITHUB_OUTPUT
          "PRERELEASE=${isPrerelease}" >> $env:GITHUB_OUTPUT
          "ZIP_NAME=${zipName}"        >> $env:GITHUB_OUTPUT

          Write-Host "────────────────────────────────────"
          Write-Host "  Tag        : $tag"
          Write-Host "  Draft      : $draft"
          Write-Host "  Prerelease : $isPrerelease"
          Write-Host "  Artifact   : $zipName"
          Write-Host "────────────────────────────────────"

      # ── 3. Create and push git tag (manual trigger only) ────────────────────
      - name: "Create git tag (workflow_dispatch only)"
        if: github.event_name == 'workflow_dispatch'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ steps.meta.outputs.TAG }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          $remoteTag = & git ls-remote --tags origin "refs/tags/$tag" 2>&1
          if ($remoteTag) {
            Write-Host "Tag '$tag' already exists on remote — skipping."
          } else {
            git tag $tag
            git push origin $tag
            Write-Host "Created and pushed tag: $tag"
          }

      # ── 4. Set up Python ────────────────────────────────────────────────────
      - name: "Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          # requirements.txt in the repo root is used as the cache key.
          # pyinstaller is a build-only tool and lives outside this file.
          cache-dependency-path: "requirements.txt"

      # ── 5. Install build dependencies ───────────────────────────────────────
      - name: "Install Python build dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          python -m pip show pydivert pyinstaller

      # ── 6. Download and extract WinDivert ───────────────────────────────────
      - name: "Download WinDivert ${{ env.WINDIVERT_VERSION }}"
        shell: pwsh
        run: |
          $url     = "${{ env.WINDIVERT_URL }}"
          $zipPath = Join-Path $env:TEMP "WinDivert.zip"
          $extPath = Join-Path $env:TEMP "WinDivert-extracted"

          Write-Host "Downloading from: $url"
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing -ErrorAction Stop

          $sha256 = (Get-FileHash $zipPath -Algorithm SHA256).Hash
          Write-Host "Archive SHA-256 : $sha256"

          Write-Host "Extracting..."
          Expand-Archive -Path $zipPath -DestinationPath $extPath -Force

          $dll = Get-ChildItem -Path $extPath -Filter "WinDivert.dll" -Recurse |
                 Where-Object { $_.DirectoryName -match "x64" } |
                 Select-Object -First 1

          $sys = Get-ChildItem -Path $extPath -Filter "WinDivert64.sys" -Recurse |
                 Select-Object -First 1

          if (-not $dll) { throw "WinDivert.dll (x64) not found in archive" }
          if (-not $sys) { throw "WinDivert64.sys not found in archive" }

          Copy-Item $dll.FullName -Destination ".\WinDivert.dll"   -Force
          Copy-Item $sys.FullName -Destination ".\WinDivert64.sys"  -Force

          Write-Host "WinDivert.dll   <- $($dll.FullName)"
          Write-Host "WinDivert64.sys <- $($sys.FullName)"

          if (-not (Test-Path ".\WinDivert.dll"))   { throw "WinDivert.dll missing" }
          if (-not (Test-Path ".\WinDivert64.sys")) { throw "WinDivert64.sys missing" }
          Write-Host "WinDivert binaries verified."

      # ── 7. Build executable with PyInstaller ────────────────────────────────
      - name: "Build executable (PyInstaller)"
        run: >
          pyinstaller
          --onefile
          --uac-admin
          --name zapret-discord
          --clean
          main.py

      # ── 8. Verify build artifact ─────────────────────────────────────────────
      - name: "Verify build artifact"
        shell: pwsh
        run: |
          $exe = ".\dist\zapret-discord.exe"
          if (-not (Test-Path $exe)) {
            throw "Build failed: zapret-discord.exe not produced in dist\"
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 2)
          $hash   = (Get-FileHash $exe -Algorithm SHA256).Hash
          Write-Host "zapret-discord.exe — ${sizeMB} MB"
          Write-Host "SHA-256            — $hash"

      # ── 9. Package release ZIP ───────────────────────────────────────────────
      - name: "Package release ZIP"
        id: package
        shell: pwsh
        run: |
          $zipName = "${{ steps.meta.outputs.ZIP_NAME }}"
          $files   = @(
            ".\dist\zapret-discord.exe",
            ".\WinDivert.dll",
            ".\WinDivert64.sys",
            ".\README.md"
          )

          Write-Host "Packaging: $zipName"
          foreach ($f in $files) {
            if (-not (Test-Path $f)) { throw "Missing file: $f" }
            $kb = [math]::Round((Get-Item $f).Length / 1KB, 1)
            Write-Host "  + $(Split-Path $f -Leaf)  ($kb KB)"
          }

          Compress-Archive -Path $files -DestinationPath $zipName -Force

          $sizeMB  = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
          $zipHash = (Get-FileHash $zipName -Algorithm SHA256).Hash

          Write-Host "Archive : $zipName  ($sizeMB MB)"
          Write-Host "SHA-256 : $zipHash"

          "ZIP_SHA256=${zipHash}" >> $env:GITHUB_OUTPUT

      # ── 10. Publish GitHub Release ───────────────────────────────────────────
      - name: "Publish GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          tag_name:               ${{ steps.meta.outputs.TAG }}
          name:                   "zapret-discord ${{ steps.meta.outputs.TAG }}"
          draft:                  ${{ steps.meta.outputs.DRAFT }}
          prerelease:             ${{ steps.meta.outputs.PRERELEASE }}
          generate_release_notes: false
          body: |
            ## zapret-discord ${{ steps.meta.outputs.TAG }}

            Локальный инструмент обхода DPI/ТСПУ-блокировок для Discord.
            Без VPN-серверов · Облачная конфигурация (OTA) · Автоповышение прав (UAC)

            ---

            ### ⚡ Быстрая установка

            1. Скачайте **`${{ steps.meta.outputs.ZIP_NAME }}`** из раздела **Assets** ниже
            2. Распакуйте архив в любую папку
            3. Убедитесь, что рядом с `.exe` находятся оба файла драйвера:
               ```
               zapret-discord.exe
               WinDivert.dll       ← обязательно
               WinDivert64.sys     ← обязательно
               ```
            4. Запустите `zapret-discord.exe` — UAC-запрос появится автоматически

            Документация: [README.md](https://github.com/vovafes/zapret#readme)

            ---

            ### 🔐 Контрольная сумма архива

            | Файл | SHA-256 |
            |---|---|
            | `${{ steps.meta.outputs.ZIP_NAME }}` | `${{ steps.package.outputs.ZIP_SHA256 }}` |

            ---

            *GitHub Actions · Python ${{ env.PYTHON_VERSION }} · WinDivert ${{ env.WINDIVERT_VERSION }}*
          files: "./${{ steps.meta.outputs.ZIP_NAME }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
